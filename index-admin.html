<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LJ Admin · Cockpit Operacional</title>
  <link rel="icon" type="image/png" href="/public/lj-logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #050b18; color: #e2e8f0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .admin-shell { min-height: 100vh; }
    .admin-sidebar { background: #08121f; border-right: 1px solid rgba(255,255,255,0.08); }
    .admin-content { background: radial-gradient(circle at 15% 5%, rgba(99,102,241,.10), transparent 40%), #050b18; }
    .admin-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
    .admin-btn-primary { background: #6366f1; color: white; font-weight: 700; }
    .admin-btn-primary:hover { background: #4f46e5; }
    .admin-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; }
    .admin-pill-emerald { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.4); }
    .admin-pill-amber   { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.4); }
    .admin-pill-slate   { background: rgba(100,116,139,0.20); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.35); }
    .admin-pill-red     { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }
  </style>
</head>
<body>
  <div id="adminRoot"></div>

  <script src="/src/admin/adminApp.js"></script>
  <script src="/src/admin/main.js"></script>
</body>
</html>
