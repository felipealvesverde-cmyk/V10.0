# V35.11.3 — Cron diário: manutenção interna do LJ.
#
# Bate em POST /api/cron-daily-tick em prod 1x/dia às 04:00 UTC.
# O que roda no servidor:
#   - Score decay (lead inativo perde pontuação automaticamente)
#   - Purge do log RD webhook >7 dias (V35.11.1)
#
# Configuração necessária no GitHub (Settings → Secrets and variables → Actions):
#   - CRON_BASE_URL          → https://leadjourney.up.railway.app
#                              (sem barra no final)
#   - CRON_RECONCILE_TOKEN   → mesmo valor da env var no Railway
#
# Trigger manual: Actions → Cron Daily Tick → Run workflow
# (útil pra testar imediatamente sem esperar 04:00 UTC)

name: Cron Daily Tick

on:
  # V35.11.4 — Schedule comentado até Felipe configurar secrets
  # (CRON_BASE_URL + CRON_RECONCILE_TOKEN). Pra ativar agendamento
  # automático, descomenta as 2 linhas do bloco schedule abaixo.
  # schedule:
  #   - cron: '0 4 * * *'   # 04:00 UTC todos os dias
  workflow_dispatch:         # roda só manualmente até secrets prontas

jobs:
  daily-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/cron-daily-tick
        env:
          BASE: ${{ secrets.CRON_BASE_URL }}
          TOKEN: ${{ secrets.CRON_RECONCILE_TOKEN }}
        run: |
          if [ -z "$BASE" ] || [ -z "$TOKEN" ]; then
            echo "ERRO: secrets CRON_BASE_URL ou CRON_RECONCILE_TOKEN não configurados."
            exit 1
          fi
          echo "Batendo em $BASE/api/cron-daily-tick..."
          response=$(curl -sS -w "\n__STATUS__%{http_code}" -X POST "$BASE/api/cron-daily-tick" \
            -H "X-Cron-Token: $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"max_visitors_per_user": 500}')
          body=$(echo "$response" | sed -e 's/__STATUS__.*$//')
          status=$(echo "$response" | grep -o '__STATUS__[0-9]*' | sed 's/__STATUS__//')
          echo "HTTP $status"
          echo "$body" | head -c 4000
          if [ "$status" != "200" ]; then
            echo "ERRO: status $status"
            exit 1
          fi
