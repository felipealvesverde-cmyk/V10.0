<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="LeadJourney">
  <defs>
    <linearGradient id="lj-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="lj-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#lj-grad)"/>
  <g stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#lj-glow)">
    <!-- L: vertical bar + bottom serif -->
    <path d="M19 14 L19 46 L31 46"/>
    <!-- J: vertical bar + curved hook to the left -->
    <path d="M45 14 L45 41 Q45 48 38 48 L34 48"/>
  </g>
</svg>
