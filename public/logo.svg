<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="LeadJourney">
  <defs>
    <linearGradient id="lj-grad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="45%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="lj-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#lj-glow)" stroke="url(#lj-grad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- l: vertical bar -->
    <path d="M21 10 L21 50"/>
    <!-- j: vertical bar + curl at bottom -->
    <path d="M43 10 L43 46 Q43 56 33 56 L30 56"/>
  </g>
</svg>
